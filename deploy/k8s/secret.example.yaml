apiVersion: v1
kind: Secret
metadata:
  name: llm-evaluation-service-secrets
  namespace: llm-evaluation
type: Opaque
stringData:
  # Copy this file to secret.local.yaml, replace the value, and apply that file.
  APP_DATABASE_URL: "postgresql+asyncpg://app:app@postgres:5432/llm_evaluations"
  POSTGRES_PASSWORD: "app"
