name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e '.[dev]'

      - name: Run tests
        run: pytest

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy app tests

      - name: Export OpenAPI spec
        run: python scripts/export_openapi.py

      - name: Check OpenAPI spec is current
        run: git diff --exit-code openapi/openapi.json

      - name: Build package
        run: python -m build

      - name: Build Docker image
        run: docker build -t llm-evaluation-service:ci .
