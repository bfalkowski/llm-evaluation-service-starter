services:
  llm-evaluation-service:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      APP_ENVIRONMENT: local
      APP_LOG_LEVEL: INFO
      APP_OTEL_ENABLED: "true"
      APP_STORAGE_BACKEND: postgres
      APP_DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/llm_evaluations
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_evaluations
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d llm_evaluations"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
