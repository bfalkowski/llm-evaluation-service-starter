apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-evaluation-service
  namespace: llm-evaluation
  labels:
    app: llm-evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-evaluation-service
  template:
    metadata:
      labels:
        app: llm-evaluation-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: service
          image: ghcr.io/bfalkowski/llm-evaluation-service-starter:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: llm-evaluation-service-config
            - secretRef:
                name: llm-evaluation-service-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
