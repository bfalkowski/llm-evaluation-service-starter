services:
  llm-evaluation-service:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      APP_ENVIRONMENT: local
      APP_LOG_LEVEL: INFO
      APP_OTEL_ENABLED: "true"
      APP_OTEL_EXPORTER: ${APP_OTEL_EXPORTER:-console}
      APP_OTEL_OTLP_ENDPOINT: ${APP_OTEL_OTLP_ENDPOINT:-}
      # Use APP_OTEL_EXPORTER=none to quiet local trace output, or otlp with
      # APP_OTEL_OTLP_ENDPOINT=http://otel-collector:4317 for a collector.
      APP_PROCESS_ROLE: api
      APP_STORAGE_BACKEND: postgres
      APP_DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/llm_evaluations
      APP_AUTH_ENABLED: "true"
      APP_AUTH_DEMO_SECRET: local-demo-secret
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    environment:
      APP_ENVIRONMENT: local
      APP_LOG_LEVEL: INFO
      APP_OTEL_ENABLED: "true"
      APP_OTEL_EXPORTER: ${APP_OTEL_EXPORTER:-console}
      APP_OTEL_OTLP_ENDPOINT: ${APP_OTEL_OTLP_ENDPOINT:-}
      APP_PROCESS_ROLE: worker
      APP_WORKER_STALE_JOB_SECONDS: 300
      APP_STORAGE_BACKEND: postgres
      APP_DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/llm_evaluations
      APP_AUTO_CREATE_SCHEMA: "false"
      APP_AUTH_ENABLED: "true"
      APP_AUTH_DEMO_SECRET: local-demo-secret
    depends_on:
      postgres:
        condition: service_healthy
      llm-evaluation-service:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: llm_evaluations
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d llm_evaluations"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
